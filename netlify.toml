[build]
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Google Analytics 4 + Google Ads — injected into <head> of every page
[[snippets]]
  position = "head"
  html = '''
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E4R081ZJ5V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E4R081ZJ5V');
    gtag('config', 'AW-18074058844');
  </script>
  '''
